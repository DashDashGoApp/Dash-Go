<!doctype html>
<meta charset="utf-8">
<title>Dash-Go message fit regression</title>
<link rel="stylesheet" href="../ui/dashboard.css?test=message-fit-cached-lite">
<style>
  #calwrap,#sidebar{min-height:1px}
  #result{position:fixed;z-index:9999;left:8px;top:8px;max-width:90vw;padding:8px;background:#fff;color:#111;font:12px/1.3 monospace;white-space:pre-wrap}
</style>
<div id="app">
  <main id="calwrap"></main>
  <aside id="sidebar"></aside>
  <section id="compliment">
    <div id="sun"><span class="moon">◯</span><span class="suntimes"><span>6:00</span><span>20:00</span></span></div>
    <div id="comptext">Starting message</div>
    <div id="stale"></div>
  </section>
</div>
<pre id="result">running</pre>
<script>
  const profile=new URLSearchParams(location.search).get("profile")==="lite"?"lite":"balanced";
  const CONFIG={profile,fontPreset:"default",complimentFadeMs:750,showSeconds:false};
  function liteVisualProfile(){ return profile==="lite"; }
  function messageTypographySizeMultiplier(){ return 1; }
</script>
<script src="../ui/js/messages-fit.js?test=message-fit-content-height"></script>
<script src="../ui/js/messages-lite-fit.js?test=message-fit-cached-geometry"></script>
<script src="../ui/js/messages-layout.js?test=message-fit-semantic-layout"></script>
<script>
  function messageFitSnapshot(label){
    const el=document.getElementById("comptext"), parent=el.parentElement;
    const box=el.getBoundingClientRect(), parentBox=parent.getBoundingClientRect();
    return {
      label,
      size:parseFloat(getComputedStyle(el).fontSize),
      fitSize:+el.dataset.fitSize||0,
      fitLines:+el.dataset.fitLines||0,
      fitClipped:el.dataset.fitClipped||"missing",
      fitLayout:el.dataset.fitLayout||"missing",
      fitCorrected:+el.dataset.fitCorrected||0,
      displayText:el.textContent,
      clamp:+el.style.webkitLineClamp||0,
      width:Math.round(box.width),
      height:Math.round(box.height),
      clientHeight:el.clientHeight,
      scrollHeight:el.scrollHeight,
      contentFits:el.scrollHeight<=el.clientHeight+1,
      horizontalFits:el.scrollWidth<=el.clientWidth+1,
      contained:box.top>=parentBox.top-1 && box.bottom<=parentBox.bottom+1
    };
  }
  const nextFrame=()=>new Promise(resolve=>requestAnimationFrame(resolve));
  async function fitAndSettle(text){
    fitCompliment(text);
    await nextFrame();await nextFrame();
    return messageFitSnapshot("fit");
  }
  async function forceLitePredictionMiss(){
    if(profile!=="lite")return {skipped:true};
    const originalFit=window.complimentLiteFit,originalChoose=window.complimentLayoutChoose;
    let calls=0;
    try{
      window.complimentLayoutChoose=(text,assess)=>({candidate:{displayText:text,kind:"single",lines:1},fit:assess(text,{lines:1})});
      window.complimentLiteFit=(text,metrics,minimumLines)=>{
        calls++;
        if(calls<=2)return {size:72,lines:1,maxLines:3,fits:true,preferredFloor:24,targetLines:1,box:metrics,lite:true};
        return originalFit(text,metrics,minimumLines);
      };
      COMP_FIT_CACHE.clear();
      return await fitAndSettle("Kindred — similar in character or related.");
    }finally{
      window.complimentLiteFit=originalFit;
      window.complimentLayoutChoose=originalChoose;
    }
  }
  async function runMessageFitRegression(){
    try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(_){}
    const longText="Why did the calendar apply for a promotion? It had spent all year organizing dates, managing weeks, handling every last-minute event, and still found time to remind everyone that Friday was coming.";
    const jokeText="Where do fish keep their money? In the riverbank";
    const shortText="You make today brighter.";
    const descenderText="Kindred — similar in character or nature.";
    const unbrokenText="https://example.test/"+"reallylongunbrokenmessage".repeat(12);
    const exceptionalText="This intentionally overlong household message repeats enough ordinary words that Lite should preserve its reading floor and use the explicit three-line clamp rather than shrinking text until it is unreadable. ".repeat(10);
    const shortBaseline=await fitAndSettle(shortText);
    COMP_FIT_CACHE.clear();
    const joke=await fitAndSettle(jokeText);
    COMP_FIT_CACHE.clear();
    const long=await fitAndSettle(longText);
    COMP_FIT_CACHE.clear();
    const descender=await fitAndSettle(descenderText);
    COMP_FIT_CACHE.clear();
    const unbroken=await fitAndSettle(unbrokenText);
    COMP_FIT_CACHE.clear();
    const exceptional=await fitAndSettle(exceptionalText);
    const short=await fitAndSettle(shortText);
    const corrected=await forceLitePredictionMiss();
    const maxLines=profile==="lite"?3:COMP_FIT.maxLines;
    const exactClamp=snapshot=>snapshot.clamp===snapshot.fitLines;
    const jokePlanned=joke.fitLines===2 && joke.fitLayout==="question-answer" && joke.displayText==="Where do fish keep their money?\nIn the riverbank" && joke.fitSize>=shortBaseline.fitSize*.5;
    const correctedSafe=profile!=="lite" || (corrected.fitCorrected===1 && corrected.fitLines>=2 && exactClamp(corrected) && corrected.contentFits && corrected.contained);
    const passed=jokePlanned && exactClamp(shortBaseline) && exactClamp(joke) && exactClamp(long) && exactClamp(descender) && exactClamp(unbroken) && long.fitLines<=maxLines && long.contentFits && long.contained && descender.contentFits && descender.contained && unbroken.horizontalFits && short.fitSize===shortBaseline.fitSize && short.contentFits && correctedSafe && (profile!=="lite" || (exceptional.clamp===3 && exceptional.fitClipped==="true"));
    const result={passed,profile,viewport:[innerWidth,innerHeight],shortBaseline,joke,long,descender,unbroken,exceptional,short,corrected};
    document.documentElement.dataset.messageFitResult=passed?"pass":"fail";
    document.getElementById("result").textContent=JSON.stringify(result,null,2);
    window.MESSAGE_FIT_RESULT=result;
  }
  runMessageFitRegression();
</script>
